<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Hlava</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;}
  #c{position:fixed;top:0;left:0;width:100%;height:100%;}
  #fi{
    position:fixed;top:0;left:0;width:100%;height:100%;
    opacity:0;cursor:pointer;z-index:10;font-size:16px;
  }
  #p1{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    width:90px;height:90px;border-radius:50%;
    border:2px solid rgba(0,255,200,0.45);
    pointer-events:none;opacity:0;
    animation:pls 2.4s ease-out infinite;}
  #p2{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    width:140px;height:140px;border-radius:50%;
    border:1px solid rgba(0,255,200,0.2);
    pointer-events:none;opacity:0;
    animation:pls 2.4s ease-out infinite 0.8s;}
  @keyframes pls{
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.3);}
    20%{opacity:1;}
    100%{opacity:0;transform:translate(-50%,-50%) scale(2.8);}
  }
  .hide{display:none!important;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<input type="file" id="fi" accept="audio/*,video/*,.mp3,.mp4,.wav,.ogg,.m4a,.aac">
<div id="p1"></div>
<div id="p2"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ─── renderer ──────────────────────────────────────────────────── */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 3.4;

/* ─── glow sprite ───────────────────────────────────────────────── */
function makeSprite() {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,    'rgba(220,255,252,1)');
  g.addColorStop(0.15, 'rgba(0,248,220,1)');
  g.addColorStop(0.45, 'rgba(0,200,178,0.55)');
  g.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}

/* ─── head builder ──────────────────────────────────────────────── */
function buildHead() {
  const V = [];          // flat float array [x,y,z, x,y,z …]
  const UL = [];         // upper-lip vertex indices
  const LL = [];         // lower-lip vertex indices

  function pt(x,y,z){ V.push(x,y,z); }
  function ptLipU(x,y,z){ UL.push(V.length/3); V.push(x,y,z); }
  function ptLipL(x,y,z){ LL.push(V.length/3); V.push(x,y,z); }

  const rnd = ()=> Math.random();
  const nr  = (s)=> (rnd()-.5)*s;   // noise ±s/2

  /* ══ 1. BASE HEAD ELLIPSOID ══════════════════════════════════════ */
  for (let i=0; i<7500; i++) {
    // uniform sphere sample
    const th = Math.acos(2*rnd()-1);
    const ph = 2*Math.PI*rnd();
    let x = Math.sin(th)*Math.cos(ph)*0.74;
    let y = Math.cos(th)*1.08;
    let z = Math.sin(th)*Math.sin(ph);
    z *= z>=0 ? 0.82 : 0.66;   // front rounder, back flatter

    /* chin taper */
    if (y < -0.52){ const t=(-y-0.52)/0.55; x*=1-t*0.58; z*=1-t*0.32; }
    /* forehead slope back */
    if (y >  0.70){ const t=(y-0.70)/0.36;  z-=t*0.09; }
    /* very subtle mid-face push (will be overridden by explicit nose) */
    if (z>0.32 && Math.abs(x)<0.28 && y>-0.22 && y<0.12){
      const nd=Math.hypot(x/0.22,(y+0.05)/0.18);
      if(nd<1) z+=(1-nd)*0.10;
    }
    x+=nr(0.018); y+=nr(0.018); z+=nr(0.018);
    pt(x,y,z);
  }

  /* ══ 2. NOSE ═════════════════════════════════════════════════════ */
  /* bridge — narrows top to bottom */
  for (let i=0; i<200; i++){
    const t = rnd();                     // 0=top(brow) 1=tip
    const bw = 0.06 + t*0.07;           // gets wider toward tip
    const x  = nr(bw*2);
    const y  =  0.08 - t*0.24 + nr(0.02);
    const z  =  0.72 + t*0.20 + nr(0.03);
    pt(x,y,z);
  }
  /* tip — round bulb */
  for (let i=0; i<280; i++){
    const a=rnd()*Math.PI*2, r=rnd()*0.10;
    pt( Math.cos(a)*r*1.3,  -0.18+Math.sin(a)*r*0.9+nr(0.03),  0.91+nr(0.04) );
  }
  /* nostrils / wings */
  for (let s of [-1,1]){
    for (let i=0; i<180; i++){
      const t=rnd();
      pt( s*(0.08+t*0.14)+nr(0.025),  -0.20+nr(0.06),  0.84-t*0.07+nr(0.03) );
    }
    /* nostril base curve */
    for (let i=0; i<80; i++){
      pt( s*(0.06+rnd()*0.11),  -0.24+nr(0.03),  0.80+nr(0.03) );
    }
  }
  /* philtrum groove (upper lip - nose transition) */
  for (let i=0; i<80; i++){
    pt( nr(0.12),  -0.26+nr(0.03),  0.82+nr(0.02) );
  }

  /* ══ 3. LIPS ═════════════════════════════════════════════════════ */
  /* upper lip — cupid's bow */
  for (let i=0; i<350; i++){
    const t = (rnd()-.5)*2;            // -1…+1 across width
    const bow = -(Math.abs(Math.abs(t)-.5))*0.04; // dip at centre
    ptLipU( t*0.28+nr(0.025),  -0.32+bow+nr(0.022),  0.80+nr(0.025) );
  }
  /* lower lip — fuller */
  for (let i=0; i<400; i++){
    const t = (rnd()-.5)*2;
    const pout = (1-t*t)*0.05;
    ptLipL( t*0.25+nr(0.025),  -0.42-pout+nr(0.022),  0.80+nr(0.025) );
  }
  /* lip line (seam) */
  for (let i=0; i<180; i++){
    const t=(rnd()-.5)*2;
    const mid = -0.36+nr(0.012);
    /* both lip halves at seam */
    UL.push(V.length/3); V.push( t*0.27+nr(0.015), mid, 0.79+nr(0.018) );
    LL.push(V.length/3); V.push( t*0.26+nr(0.015), mid, 0.79+nr(0.018) );
  }
  /* corners of mouth */
  for (let s of [-1,1]){
    for(let i=0;i<40;i++) pt(s*0.28+nr(0.02), -0.37+nr(0.025), 0.77+nr(0.02));
  }

  /* ══ 4. EYES ════════════════════════════════════════════════════ */
  for (let s of [-1,1]){
    const ex=s*0.29, ey=0.22;
    /* upper eyelid arc */
    for(let i=0;i<200;i++){
      const t=(rnd()-.5)*2;
      const arch=(1-t*t)*0.09;
      pt( ex+t*0.19+nr(0.02),  ey+arch+nr(0.02),  0.68+nr(0.025) );
    }
    /* lower eyelid */
    for(let i=0;i<120;i++){
      const t=(rnd()-.5)*2;
      pt( ex+t*0.16+nr(0.02),  ey-0.05+nr(0.02),  0.67+nr(0.02) );
    }
    /* inner eye scatter */
    for(let i=0;i<100;i++){
      pt( ex+nr(0.28),  ey+nr(0.12),  0.62+nr(0.03) );
    }
    /* eyebrow */
    for(let i=0;i<160;i++){
      const t=(rnd()-.5)*2;
      const arch=(1-t*t)*0.07;
      pt( ex+t*0.20+nr(0.02),  ey+0.18+arch+nr(0.025),  0.62+nr(0.025) );
    }
    /* brow ridge highlight */
    for(let i=0;i<80;i++){
      const t=(rnd()-.5)*2;
      pt( ex+t*0.22+nr(0.02),  ey+0.10+nr(0.02),  0.70+nr(0.02) );
    }
  }

  /* ══ 5. CHEEKBONES ══════════════════════════════════════════════ */
  for(let s of [-1,1]){
    for(let i=0;i<150;i++){
      pt( s*(0.50+rnd()*0.12)+nr(0.03), 0.02+nr(0.10), 0.66+rnd()*0.08+nr(0.02) );
    }
  }

  /* ══ 6. JAW / CHIN ══════════════════════════════════════════════ */
  for(let i=0;i<200;i++){
    pt( nr(0.30), -0.68+nr(0.06), 0.52+rnd()*0.12+nr(0.02) );
  }

  /* ══ 7. NECK ════════════════════════════════════════════════════ */
  for(let i=0;i<700;i++){
    const a=rnd()*Math.PI*2, r=0.22+rnd()*.05;
    pt( Math.cos(a)*r,  -1.06+rnd()*.44,  Math.sin(a)*r*.94 );
  }

  /* ══ 8. COLLAR ELLIPSE ══════════════════════════════════════════ */
  for(let i=0;i<580;i++){
    const a=(i/580)*Math.PI*2+nr(0.05);
    pt( Math.cos(a)*(0.92+nr(0.06)),  -1.08+nr(0.04),  Math.sin(a)*(0.34+nr(0.03)) );
  }

  /* ══ 9. OUTER HALO CIRCLE ═══════════════════════════════════════ */
  for(let i=0;i<680;i++){
    const a=(i/680)*Math.PI*2+nr(0.014);
    const r=1.46+nr(0.012);
    pt( Math.cos(a)*r*.95,  Math.sin(a)*r,  -0.24+nr(0.01) );
  }

  return { verts: new Float32Array(V), UL, LL };
}

const { verts, UL, LL } = buildHead();

/* store base Y for lip animation */
const baseY = new Float32Array(verts.length/3);
for(let i=0;i<verts.length/3;i++) baseY[i]=verts[i*3+1];

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));

const isMobile = window.innerWidth < 768;
const mat = new THREE.PointsMaterial({
  size: isMobile ? 0.055 : 0.020,
  map: makeSprite(),
  blending: THREE.AdditiveBlending,
  transparent: true,
  depthWrite: false,
  color: new THREE.Color(0x00ffde),
  opacity: 1.0,
  sizeAttenuation: true,
});

const pts = new THREE.Points(geo, mat);
pts.rotation.x = -0.06;   // slight chin-down tilt
scene.add(pts);

/* ─── audio (iOS-safe via decodeAudioData) ──────────────────────── */
let audioCtx = null, analyser = null, currentSrc = null;
let lipAmp = 0, playing = false;

const fi = document.getElementById('fi');
const p1 = document.getElementById('p1');
const p2 = document.getElementById('p2');

fi.addEventListener('change', async () => {
  const file = fi.files[0];
  if (!file) return;

  /* create AudioContext inside user-gesture handler (iOS requirement) */
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.76;
    analyser.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  /* stop previous */
  if (currentSrc) { try { currentSrc.stop(); } catch(e){} currentSrc=null; }
  playing = false;

  try {
    const ab  = await file.arrayBuffer();
    const buf = await audioCtx.decodeAudioData(ab);
    currentSrc = audioCtx.createBufferSource();
    currentSrc.buffer = buf;
    currentSrc.connect(analyser);
    currentSrc.start(0);
    playing = true;
    p1.classList.add('hide');
    p2.classList.add('hide');
    currentSrc.onended = () => {
      playing=false; lipAmp=0;
      p1.classList.remove('hide');
      p2.classList.remove('hide');
    };
  } catch(err) {
    console.error('Audio error:', err);
    alert('Chyba prehrávania. Skús iný formát súboru (MP3 / WAV).');
  }
});

/* ─── render loop ───────────────────────────────────────────────── */
let t = 0;
const fBuf = new Uint8Array(128);

function animate() {
  requestAnimationFrame(animate);
  t += 0.008;

  /* gentle idle sway */
  pts.rotation.y = Math.sin(t * 0.26) * 0.10;

  /* lip amplitude */
  if (analyser && playing) {
    analyser.getByteFrequencyData(fBuf);
    let s=0; for(let b=2;b<=14;b++) s+=fBuf[b];
    lipAmp += (s/13/255 - lipAmp) * 0.30;
  } else {
    /* idle breathing */
    lipAmp += (Math.max(0, Math.sin(t*1.3))*0.008 - lipAmp) * 0.05;
  }

  /* animate lips */
  const pos  = geo.attributes.position.array;
  const open = lipAmp * 0.26;
  for (const i of UL) pos[i*3+1] = baseY[i] + open * 0.55;
  for (const i of LL) pos[i*3+1] = baseY[i] - open * 0.45;
  geo.attributes.position.needsUpdate = true;

  mat.opacity = 0.90 + Math.sin(t*.8)*0.06 + lipAmp*0.20;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
