<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Hlava</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;}
  #c{position:fixed;top:0;left:0;width:100%;height:100%;}
  #fi{position:fixed;top:0;left:0;width:100%;height:100%;
      opacity:0;cursor:pointer;z-index:10;font-size:16px;}
  .ring{position:fixed;top:50%;left:50%;border-radius:50%;
        pointer-events:none;opacity:0;transform:translate(-50%,-50%) scale(.3);}
  #r1{width:80px;height:80px;border:2px solid rgba(0,255,200,.5);
      animation:pls 2.4s ease-out infinite;}
  #r2{width:135px;height:135px;border:1px solid rgba(0,255,200,.2);
      animation:pls 2.4s ease-out infinite .8s;}
  @keyframes pls{
    0%  {opacity:0;transform:translate(-50%,-50%) scale(.3);}
    20% {opacity:1;}
    100%{opacity:0;transform:translate(-50%,-50%) scale(2.8);}
  }
  .hide{display:none!important;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<input type="file" id="fi" accept="audio/*,video/*,.mp3,.mp4,.m4a,.wav,.ogg,.aac">
<div class="ring" id="r1"></div>
<div class="ring" id="r2"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
const SILENT = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAAABkYXRhAAAAAA==';

/* ── Renderer ───────────────────────────────────────────────────── */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 3.4;

const isMobile = window.innerWidth < 768;

/* ── Sprite factory ─────────────────────────────────────────────── */
function mkSprite(inner, outer){
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64,64,0, 64,64,64);
  g.addColorStop(0,    inner);
  g.addColorStop(0.25, inner.replace(/[\d.]+\)$/,'0.85)'));
  g.addColorStop(0.55, outer);
  g.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const headSprite = mkSprite('rgba(210,255,250,1)', 'rgba(0,195,175,0.45)');
const eyeSprite  = mkSprite('rgba(255,255,255,1)', 'rgba(100,200,255,0.35)');

/* ── Head geometry ──────────────────────────────────────────────── */
function buildHead(){
  const V=[],UL=[],LL=[];
  const R=Math.random, nr=s=>(R()-.5)*s;

  function surf(th,ph){
    let x=Math.sin(th)*Math.cos(ph)*0.74;
    let y=Math.cos(th)*1.10;
    let z=Math.sin(th)*Math.sin(ph);
    z *= z>=0 ? 0.82 : 0.64;
    if(y>0.45){const t=(y-0.45)/0.65; x*=1+t*0.06;}
    if(y>0.20&&y<0.55&&Math.abs(x)>0.50){const t=(Math.abs(x)-.50)/.25; z-=t*.08;}
    if(y<-0.50){const t=(-y-.50)/.64; x*=1-t*.42; z*=1-t*.22;}  // oval chin
    if(y>0.72){const t=(y-.72)/.38; z-=t*.10;}
    if(z>0.32&&Math.abs(x)<0.26&&y>-0.20&&y<0.14){
      const nd=Math.hypot(x/.22,(y+.04)/.18); if(nd<1) z+=(1-nd)*.12;
    }
    return [x,y,z];
  }

  const eyeH = (x,y,z) => ((x>.12&&x<.44 || x<-.12&&x>-.44) && y>.10&&y<.32&&z>.54);
  const lipG = (x,y,z) => (Math.abs(x)<.24 && y>-.38&&y<-.32 && z>.62);
  const nBr  = (x,y,z) => (Math.abs(x)<.10 && y>-.18&&y<.10 && z>.62);
  const nDp  = (x,y,z) => (Math.abs(x)>.06&&Math.abs(x)<.20 && y>-.24&&y<-.14 && z>.68);

  let att=0;
  while(V.length/3 < 9500 && att < 200000){
    att++;
    const [x,y,z] = surf(Math.acos(2*R()-1), 2*Math.PI*R());
    if(eyeH(x,y,z) && R()>.18) continue;
    if(lipG(x,y,z) && R()>.08) continue;
    if(nBr(x,y,z)  && R()>.45) continue;
    if(nDp(x,y,z)  && R()>.40) continue;
    const px=x+nr(.016), py=y+nr(.016), pz=z+nr(.016);
    if(pz>.60 && Math.abs(px)<.28){
      if(py>-.33&&py<-.22) UL.push(V.length/3);
      if(py>-.46&&py<-.34) LL.push(V.length/3);
    }
    V.push(px,py,pz);
  }

  /* smaller nose */
  for(let i=0;i<130;i++){const t=R(); V.push(nr(.06+t*.04), .08-t*.20+nr(.02), .74+t*.16+nr(.02));}
  for(let i=0;i<180;i++){const a=R()*Math.PI*2,r=R()*.07; V.push(Math.cos(a)*r*1.1, -.15+Math.sin(a)*r*.8+nr(.025), .89+nr(.03));}
  for(let s of[-1,1]){
    for(let i=0;i<120;i++){const t=R(); V.push(s*(.07+t*.10)+nr(.02), -.16+nr(.06), .82-t*.07+nr(.025));}
    for(let i=0;i<55;i++) V.push(s*(.06+R()*.08), -.21+nr(.025), .79+nr(.02));
  }

  /* lips */
  const ptU=(x,y,z)=>{UL.push(V.length/3); V.push(x,y,z);};
  const ptL=(x,y,z)=>{LL.push(V.length/3); V.push(x,y,z);};
  for(let i=0;i<260;i++){const t=(R()-.5)*2; ptU(t*.27+nr(.022), -.30-(Math.abs(Math.abs(t)-.5))*.035+nr(.02), .78+nr(.022));}
  for(let i=0;i<300;i++){const t=(R()-.5)*2; ptL(t*.25+nr(.022), -.42-(1-t*t)*.04+nr(.02), .78+nr(.022));}
  for(let i=0;i<70;i++) V.push(nr(.10), -.25+nr(.03), .82+nr(.02));

  /* brows + eyelids */
  for(let s of[-1,1]){
    for(let i=0;i<130;i++){const t=(R()-.5)*2; V.push(s*(.26+t*.20)+nr(.02), .36+(1-t*t)*.06+nr(.022), .64+nr(.022));}
    for(let i=0;i<120;i++){const t=(R()-.5)*2; V.push(s*(.28+t*.17)+nr(.018), .22+(1-t*t)*.08+nr(.018), .70+nr(.020));}
    for(let i=0;i<80;i++)  V.push(s*(.28+nr(.16)), .14+nr(.018), .68+nr(.018));
    for(let i=0;i<40;i++)  V.push(s*.14+nr(.025), .19+nr(.03), .68+nr(.02));
    for(let i=0;i<120;i++) V.push(s*(.52+R()*.10)+nr(.025), .02+nr(.08), .62+R()*.10+nr(.02));
    for(let i=0;i<200;i++){const a=R()*Math.PI*2,r=R()*.12; V.push(s*(.74+r*.5)+nr(.02), .05+Math.sin(a)*.22*r*5+nr(.04), -.12+Math.cos(a)*.10*r*5+nr(.03));}
  }
  for(let i=0;i<160;i++) V.push(nr(.24), -.68+nr(.06), .50+R()*.12+nr(.02));

  /* neck + collar + halo */
  for(let i=0;i<700;i++){const a=R()*Math.PI*2,r=.22+R()*.05; V.push(Math.cos(a)*r,-1.06+R()*.44,Math.sin(a)*r*.94);}
  for(let i=0;i<600;i++){const a=(i/600)*Math.PI*2+nr(.05); V.push(Math.cos(a)*(.92+nr(.06)),-1.08+nr(.04),Math.sin(a)*(.36+nr(.03)));}
  for(let i=0;i<700;i++){const a=(i/700)*Math.PI*2+nr(.014),r=1.46+nr(.012); V.push(Math.cos(a)*r*.95,Math.sin(a)*r,-.24+nr(.01));}

  return {verts:new Float32Array(V), UL, LL};
}

const {verts,UL,LL} = buildHead();
const baseY = new Float32Array(verts.length/3);
for(let i=0;i<verts.length/3;i++) baseY[i]=verts[i*3+1];
const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(verts,3));
const mat = new THREE.PointsMaterial({
  size: isMobile?.040:.014, map: headSprite,
  blending:THREE.AdditiveBlending, transparent:true, depthWrite:false,
  color:new THREE.Color(0x00ffde), opacity:1.0, sizeAttenuation:true,
});
const pts = new THREE.Points(geo,mat);
pts.rotation.x = -.06;
scene.add(pts);

/* ── GLOWING EYE SPHERES ────────────────────────────────────────── */
function buildEyes(){
  // R defined HERE — fixes "R is not defined" bug
  const R = Math.random;
  const V = [];

  for(let s of [-1,1]){
    const ex=s*0.285, ey=0.205, ez=0.652;
    const rad = 0.078;

    // Core — dense bright volume
    for(let i=0;i<500;i++){
      // Sample inside sphere, biased toward center for bright core
      const u = Math.pow(R(), 0.4) * rad;
      const th = Math.acos(2*R()-1);
      const ph = R()*Math.PI*2;
      V.push(
        ex + Math.sin(th)*Math.cos(ph)*u,
        ey + Math.sin(th)*Math.sin(ph)*u*0.80,
        ez + Math.cos(th)*u*0.55
      );
    }
    // Mid shell
    for(let i=0;i<250;i++){
      const u = rad * (0.85 + R()*0.20);
      const th = Math.acos(2*R()-1);
      const ph = R()*Math.PI*2;
      V.push(
        ex + Math.sin(th)*Math.cos(ph)*u,
        ey + Math.sin(th)*Math.sin(ph)*u*0.80,
        ez + Math.cos(th)*u*0.55
      );
    }
    // Outer glow halo
    for(let i=0;i<200;i++){
      const u = rad*(1.1 + R()*0.35);
      const th = Math.acos(2*R()-1);
      const ph = R()*Math.PI*2;
      V.push(
        ex + Math.sin(th)*Math.cos(ph)*u,
        ey + Math.sin(th)*Math.sin(ph)*u*0.72,
        ez + Math.cos(th)*u*0.45
      );
    }
  }
  return new Float32Array(V);
}

const eyeVerts = buildEyes();                    // store for animation
const eyeAnim  = eyeVerts.slice();               // working copy
const eyeGeo   = new THREE.BufferGeometry();
eyeGeo.setAttribute('position', new THREE.BufferAttribute(eyeAnim, 3));

const eyeMat = new THREE.PointsMaterial({
  size: isMobile ? 0.046 : 0.017,
  map: eyeSprite,
  blending: THREE.AdditiveBlending,
  transparent: true, depthWrite: false,
  color: new THREE.Color(0xccf0ff),
  opacity: 1.0, sizeAttenuation: true,
});
const eyePts = new THREE.Points(eyeGeo, eyeMat);
eyePts.rotation.x = -.06;
scene.add(eyePts);

/* ── UI ─────────────────────────────────────────────────────────── */
const fi = document.getElementById('fi');
const r1 = document.getElementById('r1');
const r2 = document.getElementById('r2');
const hideRings = () => { r1.classList.add('hide');    r2.classList.add('hide'); };
const showRings = () => { r1.classList.remove('hide'); r2.classList.remove('hide'); };

/* ── Audio ──────────────────────────────────────────────────────── */
let playing=false, fakeLip=false, lipAmp=0;
let iosAud=null, iosActivated=false;
let audioCtx=null, analyser=null, currentSrc=null;

if(isIOS){
  iosAud = new Audio();
  fi.addEventListener('touchstart', ()=>{
    if(iosActivated) return;
    iosActivated = true;
    iosAud.src = SILENT; iosAud.volume = 0;
    const p = iosAud.play(); if(p) p.catch(()=>{});
    iosAud.volume = 1;
  }, {passive:true});
}

fi.addEventListener('change', async()=>{
  const file = fi.files[0]; if(!file) return;
  if(currentSrc){try{currentSrc.stop();}catch(e){} currentSrc=null;}
  if(iosAud) iosAud.pause();
  playing=false; fakeLip=false; lipAmp=0;

  if(isIOS){
    if(iosAud._url) URL.revokeObjectURL(iosAud._url);
    iosAud._url = URL.createObjectURL(file);
    iosAud.src = iosAud._url; iosAud.volume = 1;
    const tryPlay = () => iosAud.play().then(()=>{
      playing=true; fakeLip=true; hideRings();
    }).catch(()=>{
      canvas.addEventListener('click', ()=>{
        iosAud.play().then(()=>{ playing=true; fakeLip=true; hideRings(); }).catch(()=>{});
      }, {once:true});
    });
    iosAud.onended = ()=>{ playing=false; lipAmp=0; showRings(); };
    iosAud.load();
    iosAud.addEventListener('canplay', ()=>tryPlay(), {once:true});
    setTimeout(()=>{ if(!playing) tryPlay(); }, 1500);

  } else {
    if(!audioCtx){
      audioCtx = new(window.AudioContext||window.webkitAudioContext)();
      analyser  = audioCtx.createAnalyser();
      analyser.fftSize = 256; analyser.smoothingTimeConstant = 0.76;
      analyser.connect(audioCtx.destination);
    }
    if(audioCtx.state==='suspended') await audioCtx.resume();
    try{
      const ab  = await file.arrayBuffer();
      const buf = await audioCtx.decodeAudioData(ab);
      currentSrc = audioCtx.createBufferSource();
      currentSrc.buffer = buf; currentSrc.connect(analyser); currentSrc.start(0);
      playing=true; fakeLip=false; hideRings();
      currentSrc.onended = ()=>{ playing=false; lipAmp=0; showRings(); };
    } catch(err){ console.error(err); }
  }
});

/* ── Render loop ────────────────────────────────────────────────── */
let t=0; const fBuf=new Uint8Array(128);

function animate(){
  requestAnimationFrame(animate); t+=.008;

  const sway = Math.sin(t*.26)*.09;
  pts.rotation.y    = sway;
  eyePts.rotation.y = sway;

  /* lip amplitude */
  if(fakeLip && playing){
    const raw = Math.max(0, Math.sin(t*13)*Math.sin(t*4.7)*Math.sin(t*2.1))*.75
              + Math.max(0, Math.sin(t*7.3))*.25;
    lipAmp += (raw - lipAmp)*.22;
  } else if(analyser && playing){
    analyser.getByteFrequencyData(fBuf);
    let s=0; for(let b=2;b<=14;b++) s+=fBuf[b];
    lipAmp += (s/13/255 - lipAmp)*.30;
  } else {
    lipAmp += (Math.max(0,Math.sin(t*1.3))*.008 - lipAmp)*.05;
  }

  /* animate lips */
  const pos  = geo.attributes.position.array;
  const open = lipAmp * .26;
  for(const i of UL) pos[i*3+1] = baseY[i] + open*.55;
  for(const i of LL) pos[i*3+1] = baseY[i] - open*.45;
  geo.attributes.position.needsUpdate = true;
  mat.opacity = .90 + Math.sin(t*.8)*.05 + lipAmp*.20;

  /* glowing eyes — breathe + subtle look-around */
  const breathe  = .80 + Math.sin(t*1.9)*.12 + Math.sin(t*3.3)*.06;
  const lookY    = Math.sin(t*.22) * .012;
  const lookX    = Math.sin(t*.17) * .008;
  for(let i=0; i<eyeAnim.length; i+=3){
    eyeAnim[i]   = eyeVerts[i]   + lookX;
    eyeAnim[i+1] = eyeVerts[i+1] + lookY;
    eyeAnim[i+2] = eyeVerts[i+2];
  }
  eyeGeo.attributes.position.needsUpdate = true;
  eyeMat.opacity = Math.min(1.0, breathe + lipAmp*.10);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
