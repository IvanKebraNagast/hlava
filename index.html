<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Hlava</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; background:#000; overflow:hidden; }
  canvas { display:block; width:100%; height:100%; touch-action:none; cursor:pointer; }
  #fi { display:none; }
  #p1 { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:80px; height:80px; border-radius:50%; border:2px solid rgba(0,255,200,0.5); pointer-events:none; opacity:0; animation:pls 2.2s ease-out infinite; }
  #p2 { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:130px; height:130px; border-radius:50%; border:1.5px solid rgba(0,255,200,0.22); pointer-events:none; opacity:0; animation:pls 2.2s ease-out infinite 0.7s; }
  @keyframes pls { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.4);} 25%{opacity:1;} 100%{opacity:0;transform:translate(-50%,-50%) scale(2.5);} }
  .hide{display:none!important;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<input type="file" id="fi" accept="audio/*,video/*,.mp3,.mp4,.wav,.ogg,.m4a,.aac">
<div id="p1"></div>
<div id="p2"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas=document.getElementById('c'),fi=document.getElementById('fi');
const p1=document.getElementById('p1'),p2=document.getElementById('p2');

const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x000000,1);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,100);
camera.position.z=3.2;

/* Glow sprite */
function makeSprite(){
  const c=document.createElement('canvas');c.width=c.height=128;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(200,255,248,1)');
  g.addColorStop(0.18,'rgba(0,245,218,1)');
  g.addColorStop(0.5,'rgba(0,200,180,0.55)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const sprite=makeSprite();

/* Build head */
function buildHead(){
  const V=[],UL=[],LL=[];
  function push(x,y,z,lip){
    const idx=V.length/3;
    if(lip&&z>0.55&&Math.abs(x)<0.34){
      if(y>-0.33&&y<-0.23) UL.push(idx);
      if(y>-0.45&&y<-0.34) LL.push(idx);
    }
    V.push(x,y,z);
  }
  /* Head surface */
  for(let i=0;i<9000;i++){
    const theta=Math.acos(2*Math.random()-1);
    const phi=2*Math.PI*Math.random();
    let x=Math.sin(theta)*Math.cos(phi);
    let y=Math.cos(theta);
    let z=Math.sin(theta)*Math.sin(phi);
    x*=0.74; y*=1.08; z*=(z>=0)?0.84:0.68;
    if(y<-0.52){const t=(-y-0.52)/0.56;x*=1-t*0.55;z*=1-t*0.30;}
    if(y>0.70){const t=(y-0.70)/0.38;z-=t*0.10;}
    if(z>0.30&&Math.abs(x)<0.26&&y>-0.22&&y<0.14){
      const nd=Math.hypot(x/0.20,(y+0.04)/0.18);
      if(nd<1.0)z+=(1-nd)*0.22;
    }
    if(y>0.10&&y<0.34&&z>0.48){
      if((x>0.14&&x<0.46)||(x<-0.14&&x>-0.46))z-=0.05*(1-Math.abs(x)*1.8);
    }
    x+=(Math.random()-.5)*.020;y+=(Math.random()-.5)*.020;z+=(Math.random()-.5)*.020;
    push(x,y,z,true);
  }
  /* Neck */
  for(let i=0;i<700;i++){
    const a=Math.random()*Math.PI*2,r=0.23+Math.random()*.05;
    push(Math.cos(a)*r,-1.06+Math.random()*.44,Math.sin(a)*r*.95,false);
  }
  /* Collar ring */
  for(let i=0;i<550;i++){
    const a=(i/550)*Math.PI*2+(Math.random()-.5)*.05;
    push(Math.cos(a)*(0.90+(Math.random()-.5)*.06),-1.08+(Math.random()-.5)*.04,Math.sin(a)*(0.34+(Math.random()-.5)*.03),false);
  }
  /* Halo circle */
  for(let i=0;i<650;i++){
    const a=(i/650)*Math.PI*2+(Math.random()-.5)*.015;
    const r=1.44+(Math.random()-.5)*.012;
    push(Math.cos(a)*r*.95,Math.sin(a)*r,-0.22+(Math.random()-.5)*.01,false);
  }
  return{verts:new Float32Array(V),UL,LL};
}

const{verts,UL,LL}=buildHead();
const baseY=new Float32Array(verts.length/3);
for(let i=0;i<verts.length/3;i++)baseY[i]=verts[i*3+1];

const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(verts,3));

const isMobile=window.innerWidth<768;
const mat=new THREE.PointsMaterial({
  size:isMobile?0.050:0.018,
  map:sprite,blending:THREE.AdditiveBlending,
  transparent:true,depthWrite:false,
  color:new THREE.Color(0x00ffde),opacity:1.0,sizeAttenuation:true
});

const pts=new THREE.Points(geo,mat);
scene.add(pts);

/* Audio */
let audioCtx=null,analyser=null,lipAmp=0,playing=false;
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;analyser.smoothingTimeConstant=0.75;
  analyser.connect(audioCtx.destination);
}
function onTap(e){if(e&&e.preventDefault)e.preventDefault();initAudio();if(audioCtx.state==='suspended')audioCtx.resume();fi.value='';fi.click();}
canvas.addEventListener('click',onTap);
canvas.addEventListener('touchstart',onTap,{passive:false});
fi.addEventListener('change',async()=>{
  const file=fi.files[0];if(!file)return;
  try{
    const buf=await file.arrayBuffer();
    const aBuf=await audioCtx.decodeAudioData(buf);
    const src=audioCtx.createBufferSource();
    src.buffer=aBuf;src.connect(analyser);src.start();
    playing=true;p1.classList.add('hide');p2.classList.add('hide');
    src.onended=()=>{playing=false;lipAmp=0;p1.classList.remove('hide');p2.classList.remove('hide');};
  }catch(err){alert('Chyba pri načítaní súboru: '+err.message);}
});

/* Render */
let t=0;const fBuf=new Uint8Array(128);
function animate(){
  requestAnimationFrame(animate);t+=0.008;
  pts.rotation.y=Math.sin(t*.28)*.12;
  pts.rotation.x=Math.sin(t*.17)*.025-.02;
  if(analyser&&playing){
    analyser.getByteFrequencyData(fBuf);
    let s=0;for(let b=2;b<=14;b++)s+=fBuf[b];
    lipAmp+=(s/13/255-lipAmp)*.30;
  }else{
    lipAmp+=(Math.max(0,Math.sin(t*1.35))*.010-lipAmp)*.06;
  }
  const pos=geo.attributes.position.array;
  const open=lipAmp*.24;
  for(const i of UL)pos[i*3+1]=baseY[i]+open*.55;
  for(const i of LL)pos[i*3+1]=baseY[i]-open*.45;
  geo.attributes.position.needsUpdate=true;
  mat.opacity=0.92+Math.sin(t*.9)*.05+lipAmp*.18;
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
